<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Biblioteca</title>
</head>
<body>
    <div class="login">
        <img src="Senai Azul.png" alt="Logo SENAI" class="logo-senai">
        <div class="biblioteca">Biblioteca Senai</div>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button class="btn-entrar">Entrar</button>
    </div>
</body>

<style>
/* Remove margens e paddings padrão e prepara o body como container flexível */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background-color: #F7FAFC;  /* Fundo da página: branco gelo */
    display: flex;
    justify-content: center;    /* Centraliza horizontalmente */
    align-items: center;        /* Centraliza verticalmente */
    font-family: Arial, sans-serif;
}

/* Container principal do login - card branco centralizado */
.login {
    width: 480px;               /* Largura fixa para desktop */
    max-width: 90%;             /* Adapta para telas menores */
    padding: 48px 40px;         /* Espaçamento interno */
    background-color: #FFFFFF;  /* Fundo branco para destaque */
    border-radius: 12px;        /* Cantos arredondados */
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);  /* Sombra suave */
    border: 1px solid #E2E8F0;  /* Borda cinza claro */
    display: flex;
    flex-direction: column;     /* Organiza elementos em coluna */
    align-items: center;        /* Centraliza horizontalmente */
}

/* Estilo da logo do SENAI */
.logo-senai {
    width: 220px;               /* Tamanho controlado da logo */
    height: auto;               /* Mantém proporção original */
    margin: 0 auto 16px auto;   /* Centraliza e espaça abaixo */
    display: block;
}

/* Texto "Biblioteca Senai" abaixo da logo */
.biblioteca {
    font-size: 20px;            /* Tamanho destacado */
    font-weight: 500;           /* Peso médio (semi-negrito) */
    color: #003366;             /* Azul SENAI */
    margin-bottom: 30px;        /* Espaço antes dos inputs */
    text-align: center;
    letter-spacing: 0.5px;      /* Pequeno espaçamento entre letras */
}

/* Estilo dos campos de entrada (usuário e senha) */
input {
    width: 100%;
    padding: 14px 18px;         /* Espaçamento interno confortável */
    margin-bottom: 18px;        /* Espaço entre campos */
    border: 1px solid #A0AEC0;  /* Borda cinza médio */
    border-radius: 6px;         /* Cantos levemente arredondados */
    font-size: 16px;
    box-sizing: border-box;     /* Padding não aumenta a largura total */
    background-color: #F1F5F9;  /* Fundo cinza suave */
}

/* Efeito quando o campo está selecionado (foco) */
input:focus {
    outline: none;              /* Remove contorno padrão */
    border-color: #003366;      /* Borda azul SENAI */
    box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);  /* Brilho suave */
}

/* Botão de entrar */
.btn-entrar {
    width: 100%;
    padding: 16px 18px;         /* Botão com altura confortável */
    background-color: #003366;  /* Azul SENAI */
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;            /* Mãozinha ao passar o mouse */
    transition: background-color 0.3s;  /* Transição suave */
}

/* Efeito hover do botão */
.btn-entrar:hover {
    background-color: #002244;  /* Azul mais escuro */
}

/* Estilização do texto de placeholder nos inputs */
::placeholder {
    color: #718096;             /* Cinza médio-escuro */
    opacity: 0.7;               /* Leve transparência */
}

/* Ajustes para telas pequenas (celulares) */
@media (max-width: 500px) {
    .login {
        padding: 32px 24px;     /* Reduz espaçamento interno */
    }
    
    .logo-senai {
        width: 160px;           /* Logo menor em celular */
    }
    
    .biblioteca {
        font-size: 18px;        /* Texto levemente menor */
        margin-bottom: 24px;
    }
    
    input, .btn-entrar {
        padding: 12px 14px;     /* Inputs e botão mais compactos */
    }
}
</style>
</html>
